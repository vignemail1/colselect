name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset: colselect-linux-amd64
          - goos: linux
            goarch: arm64
            asset: colselect-linux-arm64
          - goos: darwin
            goarch: amd64
            asset: colselect-macos-amd64
          - goos: darwin
            goarch: arm64
            asset: colselect-macos-arm64
          - goos: windows
            goarch: amd64
            asset: colselect-windows-amd64.exe
          - goos: windows
            goarch: arm64
            asset: colselect-windows-arm64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o dist/${{ matrix.asset }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          body: |
            ## colselect ${{ github.ref_name }}

            ### Assets
            | File | Platform | Arch |
            |---|---|---|
            | `colselect-linux-amd64` | Linux | x86_64 |
            | `colselect-linux-arm64` | Linux | ARM64 |
            | `colselect-macos-amd64` | macOS | x86_64 |
            | `colselect-macos-arm64` | macOS | Apple Silicon |
            | `colselect-windows-amd64.exe` | Windows | x86_64 |
            | `colselect-windows-arm64.exe` | Windows | ARM64 |

            Verify integrity with `checksums.txt` (SHA-256).
          files: |
            dist/colselect-linux-amd64
            dist/colselect-linux-arm64
            dist/colselect-macos-amd64
            dist/colselect-macos-arm64
            dist/colselect-windows-amd64.exe
            dist/colselect-windows-arm64.exe
            dist/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
